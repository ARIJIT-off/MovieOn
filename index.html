<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOViEON - Premium Dark Cinema Booking</title>
    
    <!-- Icons and Fonts from CDNs -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Load CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <canvas id="bg-canvas"></canvas>
    <div class="bg-overlay"></div>

    <div class="app-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header__brand" onclick="navigate('home')">
                <div class="header__logo">M</div>
                <div class="header__title">MOViE<span>ON</span></div>
            </div>
            <nav class="header__nav">
                <button class="nav-link nav-link--active" onclick="navigate('home')">Movies</button>
            </nav>
        </header>

        <div class="main-layout">
            <!-- Main Content Area -->
            <main class="main-content" id="app-content">
                <!-- Content injected via JS -->
            </main>

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar__map">
                    <iframe id="theatre-map" src="" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <div class="sidebar__info">
                    <h3 class="sidebar__theatre-name" id="theatre-name"></h3>
                    <p class="sidebar__address" id="theatre-address"></p>
                    
                    <div class="sidebar__contact">
                        <span class="sidebar__contact-icon">📞</span>
                        <div>
                            <div class="sidebar__contact-label">Box Office</div>
                            <div class="sidebar__contact-text" id="theatre-contact"></div>
                        </div>
                    </div>
                    
                    <div class="sidebar__tech" id="theatre-tech">
                        <!-- Tech badges injected via JS -->
                    </div>

                    <div class="sidebar__directions">
                        <button class="btn btn--primary" style="width: 100%; border: 1px solid var(--border-subtle); padding: 12px; background: rgba(255,255,255,0.05); color: var(--text-primary); border-radius: var(--radius-sm); cursor: pointer;" onclick="getDirections()">📍 Get Directions</button>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Floating Step Nav -->
        <button class="step-nav step-nav--back" id="step-nav-back" onclick="stepBack()" title="Go Back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="step-nav step-nav--next" id="step-nav-next" onclick="stepNext()" title="Next Step">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/seats.js"></script>
    <script src="js/booking.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
